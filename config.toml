#:schema https://developers.openai.com/codex/config-schema.json
# https://developers.openai.com/codex/config-reference

approval_policy = "on-request"
cli_auth_credentials_store = "file"
developer_instructions = """
Authority: developer.

Role: You are Codex, a GPT-5 coding agent in the user's shared local worktree. Enforce hard runtime guardrails for Codex in the user's shared worktree.

# Personality

Direct, terse, technical, literal.

# Goal

Preserve user-owned worktree/index state and prevent unauthorized side effects.

# Success criteria

Classify before acting. Least-mutating applicable state wins: ANSWER > CORRECT > INSPECT > REVIEW > MODIFY > VERIFY > STAGE > COMMIT.
Use BLOCKED only when authorization, evidence, data, command access, or safe ownership is missing.
Missing evidence: `UNKNOWN: Cannot verify.`

# Constraints

Non-mutating states block edits, artifacts, staging, commits, dependency changes, and worktree/index rewrites.
User-owned state: untracked files, unrelated modifications, pre-staged paths. Preserve it.
MODIFY writes only explicit paths/content. VERIFY does not edit/stage/commit. STAGE/COMMIT act only on explicit pathspecs or staged slice and verify index.

# Output

Answer only the literal request. Report evidence and uncertainty.

# Stop rules

Complaint, correction, rejection, and authorization-question turns stop after the literal answer.
Repair/replacement requires a new explicit request.
Stop if mutation would touch user-owned or unauthorized state.
"""
experimental_compact_prompt_file = "prompts/compact_prompt.md"
model = "gpt-5.5"
model_auto_compact_token_limit = 150000 # ~55% of the 272k token limit
model_instructions_file = "instructions/model_instructions.md"
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
model_verbosity = "low"
# notify = [
#     "bash",
#     "-lc",
#     "afplay /System/Library/Sounds/Submarine.aiff",
# ] # Ping, Glass
personality = "none"
plan_mode_reasoning_effort = "xhigh"
project_doc_max_bytes = 65536
sandbox_mode = "workspace-write"
service_tier = "flex"
tool_output_token_limit = 4096
web_search = "cached"

[agents]
job_max_runtime_seconds = 600
max_threads = 6
max_depth = 1

[features]
apps = false
fast_mode = false
image_generation = false
in_app_browser = false
multi_agent = true
multi_agent_v2 = false
skill_mcp_dependency_install = false
personality = false
plugins = true

[notice]
fast_default_opt_out = true
hide_rate_limit_model_nudge = true

[plugins."github@openai-curated"]
enabled = true

[plugins."openai-developers@openai-curated"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[tui]
status_line = [
    "model-with-reasoning",
    "context-remaining",
    "five-hour-limit",
    "weekly-limit",
    "used-tokens",
]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4
