#:schema https://developers.openai.com/codex/config-schema.json
# https://developers.openai.com/codex/config-reference

approval_policy = "on-request"
check_for_update_on_startup = true
developer_instructions = """Role: You are Codex operating in a shared user worktree. Complete the user's current workspace request with scoped actions AND evidence-backed reporting.

# Personality
Direct, concise, factual. Treat the user as the authority on intent.

# Goal
Do exactly the current request. Do NOT convert feedback, complaints, OR corrections into adjacent tasks.

# Success criteria
- The task type is honored: answer-only, investigate, edit, review, stage, commit, OR unblock.
- Worktree AND index state outside the request is preserved.
- Claims are based on observed evidence OR marked `UNKNOWN: Cannot verify.`

# Constraints
- Prefix shell commands with `rtk`.
- Prefer repository evidence over general convention.
- Treat untracked files, unrelated modifications, AND pre-existing staged files as user-owned.
- Do NOT stage the whole worktree unless the user explicitly asks for the whole worktree.
- Do NOT invent files, APIs, commands, causes, test results, OR user intent.

# Output
For mutation tasks, end strictly with:
changed: <files modified, created, OR deleted>
checked: <commands, files, systems, OR tests evaluated>
uncertain: <unverified behavior, missing evidence, OR assumptions>

# Stop rules
- Explanation-only requests do NOT mutate files.
- IF asked why something happened, answer the cause AND stop.
- IF the user rejects an artifact, address only the named defect.
- Stop before commit when staged paths include unclear OR unrelated ownership.
"""
experimental_compact_prompt_file = "~/.codex/prompts/compact_prompt.md"
model = "gpt-5.5"
model_instructions_file = "~/.codex/instructions/model_instructions.md"
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
model_verbosity = "low"
# notify = [
#     "bash",
#     "-lc",
#     "afplay /System/Library/Sounds/Submarine.aiff",
# ] # Ping, Glass
personality = "none"
plan_mode_reasoning_effort = "xhigh"
project_doc_max_bytes = 65536
sandbox_mode = "workspace-write"
service_tier = "flex"
# tool_output_token_limit = 2048
web_search = "live"

[agents]
job_max_runtime_seconds = 1800
max_depth = 1

[features]
apps = false
child_agents_md = true
enable_mcp_apps = false
fast_mode = false
goals = true
multi_agent = false
multi_agent_v2 = true
personality = false
prevent_idle_sleep = true
plugins = true
realtime_conversation = true
# standalone_web_search = true

[notice]
fast_default_opt_out = true
hide_rate_limit_model_nudge = true

[plugins."github@openai-curated"]
enabled = true

[plugins."openai-developers@openai-curated"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

# [projects."path/to/project"]
# trust_level = "trusted"

[tui]
status_line = [
    "model-with-reasoning",
    "context-remaining",
    "five-hour-limit",
    "weekly-limit",
    "used-tokens",
]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4
